services:
  postgres:
    image: postgres:16
    container_name: streamverse-db
    environment:
      POSTGRES_USER: streamverse
      POSTGRES_PASSWORD: streamverse
      POSTGRES_DB: streamverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamverse -d streamverse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
